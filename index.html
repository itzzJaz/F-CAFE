    <h4 id = "likeness"></h4>

    <label for="sec" style="padding: 10px">Seconds:</label><input class="tinput" id ="sec" placeholder="Seconds" type="number" min="0" max="60" >
    <label for="item" style="padding: 10px">Item Name:</label><input class="tinput" id ="item" placeholder="Item Name" >
